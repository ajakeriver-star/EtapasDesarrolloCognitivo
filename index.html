<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Room Piaget - Evaluativo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body {
    background: linear-gradient(135deg, #fdfbfb, #ebedee);
    color: black;
    font-family: 'Segoe UI', sans-serif;
}

.card {
    background: white;
    border-radius: 20px;
    border: none;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.btn-option {
    border-radius: 30px;
    margin: 8px 0;
}

.progress {
    height: 20px;
}

#gameArea {
    display: none;
}
</style>
</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-4">🧠 Escape Room: Piaget</h1>

    <div class="text-center mb-4">
        <button id="startBtn" class="btn btn-dark btn-lg px-5">▶️ Comenzar Juego</button>
    </div>

    <div id="gameArea">

        <div class="d-flex justify-content-between mb-3">
            <div>⏳ Tiempo: <span id="timer">30</span>s</div>
            <div>🎯 Puntaje: <span id="score">0</span></div>
            <div>📚 Nivel: <span id="levelDisplay">1</span>/10</div>
        </div>

        <div class="progress mb-4">
            <div id="progressBar" class="progress-bar bg-success" style="width: 10%"></div>
        </div>

        <div class="card p-4">
            <h4 id="questionText"></h4>
            <div id="optionsContainer"></div>
        </div>

    </div>
</div>

<script>

let currentLevel = 1;
let totalLevels = 10;
let score = 0;
let timer;
let timeLeft = 30;
let stageSequence = [];

const questionBank = {

sensorimotora: [
{q:"👶 El bebé desarrolla la permanencia del objeto.",o:["Sensorimotora","Formal","Preoperacional"],a:0},
{q:"👶 Aprende mediante reflejos y acción directa.",o:["Concreta","Sensorimotora","Formal"],a:1},
{q:"👶 Explora manipulando objetos.",o:["Preoperacional","Sensorimotora","Formal"],a:1}
],

preoperacional: [
{q:"🧒 Predomina el egocentrismo cognitivo.",o:["Preoperacional","Formal","Sensorimotora"],a:0},
{q:"🧒 Uso del pensamiento simbólico.",o:["Concreta","Preoperacional","Formal"],a:1},
{q:"🧒 Cree que los objetos tienen vida (animismo).",o:["Formal","Preoperacional","Concreta"],a:1}
],

concreta: [
{q:"🧠 Comprende la conservación.",o:["Concreta","Preoperacional","Formal"],a:0},
{q:"🧠 Aplica reversibilidad mental.",o:["Concreta","Formal","Preoperacional"],a:0},
{q:"🧠 Pensamiento lógico con objetos reales.",o:["Formal","Concreta","Sensorimotora"],a:1}
],

formal: [
{q:"🎓 Razonamiento hipotético-deductivo.",o:["Formal","Concreta","Preoperacional"],a:0},
{q:"🎓 Pensamiento abstracto complejo.",o:["Formal","Sensorimotora","Preoperacional"],a:0},
{q:"🎓 Analiza múltiples variables.",o:["Formal","Concreta","Sensorimotora"],a:0}
]

};

// 🔀 Mezclar arreglo
function shuffle(array){
    for(let i = array.length -1; i > 0; i--){
        const j = Math.floor(Math.random() * (i+1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function generateStageSequence(){
    const stages = ["sensorimotora","preoperacional","concreta","formal"];
    stageSequence = [];
    for(let i=0;i<totalLevels;i++){
        stageSequence.push(stages[Math.floor(Math.random()*stages.length)]);
    }
}

function loadLevel(){

    if(currentLevel > totalLevels){
        endGame();
        return;
    }

    clearInterval(timer);
    timeLeft = 30;
    document.getElementById("timer").innerText = timeLeft;
    startTimer();

    document.getElementById("levelDisplay").innerText = currentLevel;

    let stage = stageSequence[currentLevel-1];
    let questions = questionBank[stage];
    let randomQuestion = questions[Math.floor(Math.random()*questions.length)];

    document.getElementById("questionText").innerText = randomQuestion.q;

    // 🔀 Mezclar opciones manteniendo respuesta correcta
    let options = randomQuestion.o.map((text,index)=>({
        text:text,
        correct:index === randomQuestion.a
    }));

    shuffle(options);

    let optionsHTML = "";
    options.forEach(option=>{
        optionsHTML += `<button class="btn btn-outline-dark btn-option w-100"
                        onclick="checkAnswer(${option.correct})">
                        ${option.text}</button>`;
    });

    document.getElementById("optionsContainer").innerHTML = optionsHTML;

    updateProgress();
}

function checkAnswer(isCorrect){

    clearInterval(timer);

    if(isCorrect){

        score+=100;
        document.getElementById("score").innerText=score;

        Swal.fire({
            icon:'success',
            title:'¡Correcto! 🎉',
            timer:1000,
            showConfirmButton:false
        }).then(()=>{
            currentLevel++;
            loadLevel();
        });

    } else{

        score-=50;
        document.getElementById("score").innerText=score;

        Swal.fire({
            icon:'error',
            title:'Incorrecto ❌',
            text:'Retrocedes un nivel.'
        }).then(()=>{
            currentLevel = Math.max(1, currentLevel-1);
            loadLevel();
        });
    }
}

function startTimer(){
    timer=setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").innerText=timeLeft;

        if(timeLeft<=0){
            clearInterval(timer);
            score-=25;
            document.getElementById("score").innerText=score;

            Swal.fire({
                icon:'warning',
                title:'Tiempo agotado ⏳',
                text:'Retrocedes un nivel.'
            }).then(()=>{
                currentLevel = Math.max(1, currentLevel-1);
                loadLevel();
            });
        }
    },1000);
}

function updateProgress(){
    let percentage=(currentLevel/totalLevels)*100;
    document.getElementById("progressBar").style.width=percentage+"%";
}

function endGame(){
    clearInterval(timer);
    Swal.fire({
        title:"🎉 ¡Escape completado!",
        html:`<p>Puntaje final: <strong>${score}</strong></p>`,
        confirmButtonText:"Reiniciar"
    }).then(()=>location.reload());
}

document.getElementById("startBtn").addEventListener("click",()=>{
    document.getElementById("startBtn").style.display="none";
    document.getElementById("gameArea").style.display="block";
    generateStageSequence();
    loadLevel();
});

</script>

</body>
</html>
